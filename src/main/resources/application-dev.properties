# Development profile overrides
# Provides a safe fallback JWT secret for local development only.
# DO NOT use this in production. Always set environment variable JWT_SECRET in prod.

# Removed invalid property: do not set spring.profiles.active in property files.
# Use SPRING_PROFILES_ACTIVE env or command-line if you need to activate profiles.

# JWT Configuration - long random string (>= 256 bits)
jwt.secret=dev-only-very-long-random-secret-key-at-least-256-bits-0123456789abcdefDEVONLY-please-change-locally-if-needed
jwt.expiration=3600000

# Force H2 for local dev

management.health.mail.enabled=false
