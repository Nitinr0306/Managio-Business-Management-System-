# ============================================================
# Test profile overrides
# ============================================================

# FIX: previous keys (jwt.secret / jwt.expiration) matched nothing in @Value bindings
# and were silently ignored ? JWT config fell back to defaults or failed startup.
# Correct key names match JwtUtil constructor @Value annotations.

app.security.jwt.access-secret=test-access-secret-key-min-32-chars-required-for-hs512
app.security.jwt.refresh-secret=test-refresh-secret-key-min-32-chars-required-hs512

app.security.jwt.access-expiry-seconds=3600
app.security.jwt.refresh-expiry-seconds=86400
app.security.jwt.issuer=managio

# Disable mail health check (no SMTP in test)
management.health.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=3025

# Disable Flyway in unit tests (use H2 or Testcontainers separately)
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# Use H2 in-memory for unit tests
spring.datasource.url=jdbc:h2:mem:managio_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Redis in tests
app.security.blacklist.provider=memory

# Shorter lock duration for testing
app.security.account-lock-duration-minutes=1
app.security.max-login-attempts=3