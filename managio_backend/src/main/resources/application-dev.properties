
# ?? JWT ???????????????????????????????????????????????????????????????????????
# FIX B10: the previous properties were named jwt.secret / jwt.expiration which
# do not match any @Value binding in the codebase and were silently ignored.
# Correct names are app.security.jwt.access-secret and app.security.jwt.refresh-secret.
app.security.jwt.access-secret=${JWT_SECRET:please-override-this-access-secret-in-env-minimum-32-chars}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET:please-override-refresh-secret-in-env-minimum-32-chars}

# Shorter token lifetimes are helpful during development
app.security.jwt.access-expiry-seconds=3600

