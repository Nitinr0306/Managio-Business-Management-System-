# ============================================================
# DATABASE
# ============================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/managio
spring.datasource.username=managio_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA
# ============================================================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# FLYWAY
# ============================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
# REDIS
# ============================================================

spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============================================================
# JWT
# ============================================================

app.security.jwt.access-secret=dev-access-secret-minimum-32-characters
app.security.jwt.refresh-secret=dev-refresh-secret-minimum-32-characters

# ============================================================
# MAIL / RESEND
# ============================================================

RESEND_API_KEY=

app.mail.enabled=false

# ============================================================
# FRONTEND
# ============================================================

app.frontend.url=http://localhost:3000