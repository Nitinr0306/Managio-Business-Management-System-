# ============================================================
# Managio ? Application Properties
# ============================================================

spring.application.name=Managio
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================================
# DataSource
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/managio}
spring.datasource.username=${DB_USERNAME:managio_user}
spring.datasource.password=${DB_PASSWORD:Nitinr@1103}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.table=flyway_schema_history

app.name=Managio
app.version=1.0.0
app.description=Gym & Fitness Studio Management SaaS Platform

app.security.jwt.access-secret=${JWT_SECRET:please-override-this-access-secret-in-env-minimum-32-chars}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET:please-override-refresh-secret-in-env-minimum-32-chars}
app.security.jwt.access-expiry-seconds=900
app.security.jwt.refresh-expiry-seconds=2592000
app.security.jwt.issuer=managio

app.security.max-login-attempts=5
app.security.account-lock-duration-minutes=30
app.security.refresh-token-expiry-days=30
app.security.email-verification-expiry-hours=24
app.security.password-reset-expiry-hours=1
app.security.invitation-expiry-hours=72

# CSP ? override in application-prod.properties for your actual domain
app.security.csp=default-src 'none'; frame-ancestors 'none'

# Token blacklist provider: 'memory' (default, single-node) or 'redis' (multi-pod)
app.security.blacklist.provider=${BLACKLIST_PROVIDER:memory}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false

app.oauth.google.enabled=false
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/auth/callback}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
app.mail.enabled=${MAIL_ENABLED:}
app.mail.from-name=${MAIL_FROM_NAME:}

app.frontend.url=${FRONTEND_URL:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:false}

spring.task.scheduling.pool.size=5

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method



RESEND_API_KEY=${RESEND_API_KEY:}
server.port=${PORT:8082}