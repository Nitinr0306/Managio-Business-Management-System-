services:

  postgres:
    image: postgres:16

    container_name: managio-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: managio
      POSTGRES_USER: managio_user
      POSTGRES_PASSWORD: Nitinr@1103

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U managio_user -d managio"]
      interval: 10s
      timeout: 5s
      retries: 5



  redis:
    image: redis:7-alpine

    container_name: managio-redis

    restart: unless-stopped

    ports:
      - "6379:6379"



  backend:
    build:
      context: ./managio_backend

    container_name: managio-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started

    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/managio
      SPRING_DATASOURCE_USERNAME: managio_user
      SPRING_DATASOURCE_PASSWORD: Nitinr@1103

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: bwjebfeaghrfbgahywg4eurgfagwueigafaebsduygfbu2i4lawgefgsfhsejgufgwa
      JWT_REFRESH_SECRET: behsrvfawveysgfhweufgugsbbhdsvfveshbjbzgydwgfsiegfuawseufg

      RESEND_API_KEY: re_cX4ocdYP_98BNEnpdVYDzbEVCN6QCPa9d

      app.mail.from-email: onboarding@resend.dev
      app.mail.from-name: Managio
      app.frontend.url: http://localhost

      PORT: 8080

    expose:
      - "8080"



  frontend:
    build:
      context: ./managio_frontend

    container_name: managio-frontend

    restart: unless-stopped

    depends_on:
      - backend

    expose:
      - "3000"



  nginx:
    image: nginx:alpine

    container_name: managio-nginx

    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro



volumes:
  postgres-data:

